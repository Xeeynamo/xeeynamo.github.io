name: CI

on:
  push:
    branches:
    - develop
    - release/*
    - test/*

jobs:
  test:
    name: Run tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1
    - name: Run npm tests
      run: |
        npm install
        CI=true npm test
  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v1
    - name: Deploy on GitHub pages
      run: |
        npm install
        npm run deploy
